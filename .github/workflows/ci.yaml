name: PayCare ETL CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '**.md'
      - 'LICENSE'

jobs:
  tests-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pytest

      - name: Run tests (pytest)
        run: pytest -v
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Build Docker image
        run: docker build -t me/paycare .

      - name: Run ETL container
        run: |
          # If your repo contains a sample input_data.csv,
          # you can copy it before building or mount a volume.
          # Here we just run the container with its default behavior.
          docker run -v $(pwd)/app:/app me/paycare

      - name: List files after Docker run (debugging)
        run: |
          echo "Repository files:"
          ls -R .

      - name: Upload input data
        uses: actions/upload-artifact@v4
        with:
          name: paycare-input
          path: ./app/inputs/input_data.csv

      - name: Upload output data
        uses: actions/upload-artifact@v4
        with:
          name: paycare-output
          path: ./app/outputs/output_data.csv
          
      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: paycare-log
          path: ./app/logs/etl.log